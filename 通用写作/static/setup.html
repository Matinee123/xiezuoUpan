<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 写作工作台 - 安装引导</title>
<style>
:root {
  --bg: #06060e; --bg2: #0d0d18; --bg3: #151525; --bg4: #1e1e35;
  --text: #e0e0e0; --text-dim: #888; --text-bright: #fff;
  --accent: #6366f1; --accent-hover: #818cf8; --accent-glow: rgba(99,102,241,0.3);
  --border: rgba(255,255,255,0.08); --radius: 12px; --radius-sm: 8px;
  --green: #10b981; --red: #ef4444; --orange: #f59e0b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Inter","Microsoft YaHei","PingFang SC",sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.container { max-width: 600px; width: 100%; }
.header { text-align: center; margin-bottom: 24px; }
.logo {
  font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 14px; color: var(--text-dim); margin-top: 6px; }
.progress { display: flex; gap: 4px; margin-bottom: 24px; }
.progress-dot {
  flex: 1; height: 4px; background: var(--bg3); border-radius: 2px;
  transition: background 0.3s;
}
.progress-dot.active { background: var(--accent); }
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
}
.card-title { font-size: 16px; font-weight: 600; color: var(--text-bright); margin-bottom: 16px; }
.card-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
.check-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  margin-bottom: 8px; background: var(--bg4); border-radius: var(--radius-sm);
  font-size: 13px;
}
.check-icon { font-size: 16px; flex-shrink: 0; }
.scene-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.scene-card {
  padding: 12px; background: var(--bg4); border: 2px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer; text-align: center;
  transition: all 0.2s; font-size: 14px;
}
.scene-card:hover { border-color: var(--accent); }
.scene-card.selected { border-color: var(--accent); background: rgba(99,102,241,0.12); color: var(--text-bright); }
.engine-option {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px;
  border: 2px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px;
  cursor: pointer; transition: all 0.2s;
}
.engine-option:hover { border-color: var(--accent); }
.engine-option.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
.engine-radio {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; margin-top: 2px;
}
.engine-option.selected .engine-radio { border-color: var(--accent); background: var(--accent); }
.engine-name { font-size: 14px; font-weight: 600; color: var(--text-bright); }
.engine-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.engine-form { margin-top: 12px; display: none; }
.engine-option.selected .engine-form { display: block; }
.form-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 14px; color: var(--text);
  font-size: 13px; outline: none; margin-top: 8px;
}
.form-input:focus { border-color: var(--accent); }
.form-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.btn-row { display: flex; gap: 8px; margin-top: 16px; }
.btn {
  padding: 10px 20px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer;
  transition: all 0.2s; flex: 1; text-align: center;
}
.btn:hover { border-color: rgba(255,255,255,0.2); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 16px var(--accent-glow); }
.btn-skip { background: transparent; border: none; color: var(--text-dim); font-size: 13px; }
.btn-skip:hover { color: var(--text); }
.summary { font-size: 13px; line-height: 1.8; }
.summary b { color: var(--accent); }
.summary-done { text-align: center; font-size: 40px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 class="logo">AI 写作工作台</h1>
    <p class="subtitle" id="stepTitle">正在检测环境...</p>
  </div>
  <div class="progress" id="progressDots"></div>

  <!-- Step 1: Welcome + Detection -->
  <div class="card" id="step1">
    <div class="card-title">欢迎使用 AI 写作工作台</div>
    <div class="card-desc">专业的离线 AI 写作助手，隐私安全，即插即用</div>
    <div id="checkList"></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="nextStep()">开始配置 →</button></div>
  </div>

  <!-- Step 2: Scenes -->
  <div class="card" id="step2" style="display:none">
    <div class="card-title">选择写作场景（可多选）</div>
    <div class="card-desc">选择你常用的写作类型，首页会优先显示</div>
    <div class="scene-grid" id="sceneGrid"></div>
    <div class="btn-row">
      <button class="btn" onclick="prevStep()">← 上一步</button>
      <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
    </div>
  </div>

  <!-- Step 3: Engine -->
  <div class="card" id="step3" style="display:none">
    <div class="card-title">选择 AI 引擎</div>
    <div class="card-desc">推荐使用本地模型，纯离线，隐私安全</div>
    <div id="engineOptions"></div>
    <div class="btn-row">
      <button class="btn" onclick="prevStep()">← 上一步</button>
      <button class="btn btn-primary" onclick="finishSetup()">完成配置</button>
    </div>
    <button class="btn-skip" onclick="finishSetup()" style="width:100%;margin-top:8px;">跳过，使用本地模型</button>
  </div>

  <!-- Step 4: Done -->
  <div class="card" id="step4" style="display:none">
    <div class="summary-done">✅</div>
    <div class="card-title">全部就绪！</div>
    <div class="summary" id="summaryText"></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="goHome()">🚀 开始写作</button></div>
  </div>
</div>

<script>
var step = 1, selectedScenes = [], selectedEngine = "local";

function updateProgress() {
  document.getElementById("progressDots").innerHTML = [1,2,3,4].map(function(s) {
    return '<div class="progress-dot' + (s <= step ? ' active' : '') + '"></div>';
  }).join("");
  document.getElementById("stepTitle").textContent = "第 " + step + " / 4 步";
  for (var i = 1; i <= 4; i++) {
    document.getElementById("step" + i).style.display = (i === step) ? "block" : "none";
  }
}

async function detectEnv() {
  var html = "";
  // Check Python
  html += '<div class="check-item"><span class="check-icon">⏳</span><span>Python 运行环境: 检测中...</span></div>';
  // Check local model
  try {
    var r = await fetch("/api/local-status");
    var d = await r.json();
    html = "";
    html += '<div class="check-item"><span class="check-icon">✅</span><span>Python 运行环境: 已就绪</span></div>';
    if (d.available) {
      html += '<div class="check-item"><span class="check-icon">✅</span><span>离线大模型: ' + d.model_name + '</span></div>';
    } else {
      html += '<div class="check-item"><span class="check-icon">⚠️</span><span>离线大模型: 未安装（可稍后一键下载）</span></div>';
    }
    if (d.running) {
      html += '<div class="check-item"><span class="check-icon">✅</span><span>llama-server: 已运行 (端口 ' + d.port + ')</span></div>';
    } else {
      html += '<div class="check-item"><span class="check-icon">⚠️</span><span>llama-server: 未运行（选择本地引擎时自动启动）</span></div>';
    }
  } catch(e) {
    html += '<div class="check-item"><span class="check-icon">⚠️</span><span>环境检测失败: ' + e.message + '</span></div>';
  }
  html += '<div class="check-item"><span class="check-icon">✅</span><span>文档存储: U盘 _data/ 目录</span></div>';
  document.getElementById("checkList").innerHTML = html;
}

function initScenes() {
  var scenes = [
    {id:"gov", icon:"🏛", name:"党政公文", desc:"通知、请示、报告"},
    {id:"biz", icon:"💼", name:"商务文档", desc:"合同、邮件、方案"},
    {id:"law", icon:"⚖", name:"法律文书", desc:"起诉、律师函、合同"},
    {id:"edu", icon:"🍎", name:"教案课件", desc:"教案、试卷、计划"},
    {id:"stu", icon:"📚", name:"学生作文", desc:"记叙、议论、考场"},
    {id:"work", icon:"👔", name:"职场汇报", desc:"周报、OKR、总结"},
    {id:"media", icon:"📱", name:"自媒体", desc:"公众号、小红书、视频"},
    {id:"other", icon:"🌐", name:"通用写作", desc:"自由创作"}
  ];
  document.getElementById("sceneGrid").innerHTML = scenes.map(function(s) {
    return '<div class="scene-card" id="sc_' + s.id + '" onclick="toggleScene(\'' + s.id + '\')"><div style="font-size:24px;">' + s.icon + '</div><div style="font-weight:600;margin-top:4px;">' + s.name + '</div><div style="font-size:11px;color:var(--text-dim);">' + s.desc + '</div></div>';
  }).join("");
}

function toggleScene(id) {
  var el = document.getElementById("sc_" + id);
  var idx = selectedScenes.indexOf(id);
  if (idx >= 0) { selectedScenes.splice(idx, 1); el.classList.remove("selected"); }
  else { selectedScenes.push(id); el.classList.add("selected"); }
}

function initEngines() {
  var engines = [
    {id:"local", name:"本地模型 (U盘内置)", desc:"完全离线，隐私安全，无需配置", hasForm:false},
    {id:"deepseek", name:"DeepSeek (云端)", desc:"中文效果好，价格低，需联网", hasForm:true, fields:[{id:"dsKey","label":"API Key",type:"password",hint:'前往 <a href=\"https://platform.deepseek.com\" target=\"_blank\" style=\"color:var(--accent);\">platform.deepseek.com</a> 注册获取'}]},
    {id:"greenapi", name:"Green-API (云端)", desc:"API 中转服务，需联网", hasForm:true, fields:[{id:"gaKey","label":"API Key",type:"password",hint:"填写 Green-API 密钥"}]},
  ];
  document.getElementById("engineOptions").innerHTML = engines.map(function(e) {
    var form = e.hasForm ? e.fields.map(function(f) {
      return '<input type="' + f.type + '" class="form-input" id="' + f.id + '" placeholder="' + f.label + '" readonly onfocus="this.removeAttribute(\'readonly\')"><div class="form-hint">' + f.hint + '</div>';
    }).join("") : '<div class="form-hint" style="padding:6px 0;">无需配置，直接使用</div>';
    return '<div class="engine-option' + (e.id === "local" ? " selected" : "") + '" id="eng_' + e.id + '" onclick="selectEngine(\'' + e.id + '\')"><div class="engine-radio"></div><div><div class="engine-name">' + e.name + '</div><div class="engine-desc">' + e.desc + '</div><div class="engine-form">' + form + '</div></div></div>';
  }).join("");
}

function selectEngine(id) {
  selectedEngine = id;
  document.querySelectorAll(".engine-option").forEach(function(el) { el.classList.remove("selected"); });
  document.getElementById("eng_" + id).classList.add("selected");
}

async function finishSetup() {
  // Save engine preference
  var body = {engine: selectedEngine};
  if (selectedEngine === "deepseek") {
    body.api_key = document.getElementById("dsKey") ? document.getElementById("dsKey").value.trim() : "";
    body.model = "deepseek-chat";
  } else if (selectedEngine === "greenapi") {
    body.api_key = document.getElementById("gaKey") ? document.getElementById("gaKey").value.trim() : "";
    body.model = "gpt-4o-mini";
  }
  try { await fetch("/api/switch-engine", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)}); } catch(e) {}

  // Save scene preferences
  localStorage.setItem("preferredScenes", selectedScenes.join(","));
  
  // Show summary
  var sceneNames = {gov:"党政公文",biz:"商务文档",law:"法律文书",edu:"教案课件",stu:"学生作文",work:"职场汇报",media:"自媒体",other:"通用写作"};
  var engineNames = {local:"本地模型", deepseek:"DeepSeek", greenapi:"Green-API"};
  var summary = "<b>场景偏好：</b>" + (selectedScenes.length ? selectedScenes.map(function(s){ return sceneNames[s]; }).join("、") : "全部") + "<br>";
  summary += "<b>AI 引擎：</b>" + (engineNames[selectedEngine] || selectedEngine) + "<br>";
  try {
    var r = await fetch("/api/local-status");
    var d = await r.json();
    if (d.available) summary += "<b>离线模型：</b>" + d.model_name + "<br>";
  } catch(e) {}
  document.getElementById("summaryText").innerHTML = summary;
  step = 4; updateProgress();
}

function goHome() { window.location.href = "/"; }
function nextStep() { if (step < 4) { step++; updateProgress(); if (step === 2) initScenes(); if (step === 3) initEngines(); } }
function prevStep() { if (step > 1) { step--; updateProgress(); } }

detectEnv();
updateProgress();
initScenes();
</script>
</body>
</html>
