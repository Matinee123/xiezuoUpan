<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 写作工作台 - 通用版</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="logo">AI 写作工作台</h1>
      <span class="version-badge" id="versionBadge">v1.0.0</span>
    </div>
    <div class="topbar-center">
      <span id="engineStatus" class="engine-badge">引擎: deepseek</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-sm" onclick="showSettings()">⚙ 设置</button>
      <button class="btn btn-sm" onclick="showExport()">📤 导出</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>📁 文档</span>
        <button class="btn btn-xs" onclick="newDoc()">+ 新建</button>
      </div>
      <div class="doc-list" id="docList"></div>
    </aside>

    <main class="main-area">
      <div class="editor-toolbar">
        <span class="doc-title">
          <input type="text" id="docTitle" value="未命名文档" placeholder="输入标题...">
        </span>
        <div class="toolbar-actions">
          <button class="btn btn-sm" onclick="saveDoc()">💾 保存</button>
          <button class="btn btn-sm btn-danger" onclick="deleteDoc()">🗑 删除</button>
        </div>
      </div>

      <div class="editor-container">
        <div class="editor-pane">
          <div class="pane-header">编辑区</div>
          <textarea id="editor" placeholder="在此输入或粘贴内容，或使用 AI 生成..."></textarea>
          <div class="editor-actions">
            <button class="btn btn-primary" onclick="aiGenerate()">🤖 AI 生成</button>
            <button class="btn" onclick="aiContinue()">📝 续写</button>
            <button class="btn" onclick="aiRewrite()">✂️ 改写</button>
          </div>
        </div>
        <div class="preview-pane">
          <div class="pane-header">预览</div>
          <div id="preview" class="preview-content"></div>
        </div>
      </div>

      <div class="ai-panel" id="aiPanel">
        <div class="ai-panel-header">
          <span>💬 AI 对话</span>
          <button class="btn btn-xs" onclick="toggleAIPanel()">收起</button>
        </div>
        <div class="ai-messages" id="aiMessages"></div>
        <div class="ai-input-row">
          <input type="text" id="aiInput" placeholder="给 AI 下达写作指令..." onkeydown="if(event.key==='Enter') aiChat()">
          <button class="btn btn-primary btn-sm" onclick="aiChat()">发送</button>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="settingsModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙ 设置</h2>
      <button class="btn btn-xs" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>AI 引擎</label>
        <select id="engineSelect">
          <option value="deepseek">DeepSeek (云端，中文首选)</option>
          <option value="openai">OpenAI 兼容 (GPT/Claude 等)</option>
          <option value="ollama">Ollama (本地离线)</option>
          <option value="custom">自定义 API</option>
        </select>
      </div>
      <div class="form-group" id="apiKeyGroup" style="display:none">
        <label>自定义 API Key</label>
        <input type="password" id="customApiKey" placeholder="输入 API Key...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
      <button class="btn" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<div id="exportModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>📤 导出</h2>
      <button class="btn btn-xs" onclick="closeExport()">✕</button>
    </div>
    <div class="modal-body">
      <p>选择导出格式：</p>
      <div class="export-options">
        <button class="btn btn-export" onclick="doExport('markdown')">📄 Markdown</button>
        <button class="btn btn-export" onclick="doExport('html')">🌐 HTML</button>
      </div>
      <div id="exportResult" style="display:none; margin-top:16px;">
        <textarea id="exportContent" rows="10" readonly style="width:100%;background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:12px;font-family:monospace;font-size:13px;"></textarea>
        <button class="btn btn-primary" onclick="copyExport()" style="margin-top:8px;">📋 复制</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeExport()">关闭</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
